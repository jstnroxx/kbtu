<!DOCTYPE html>
<html lang="en">
    <head>
        <title>To-Do List</title>

        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <link rel="icon" type="image/x-icon" href="favicon.ico">
        <link rel="stylesheet" href="styles.css">

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap" rel="stylesheet">
    </head>

    <body>
        <header>
            <p id="header-title">TO-DO LIST</p>
            <img src="favicon.ico" width="32px" height="32px">
        </header>

        <main>
            <div>
                <p id="main-title">To-Do's</p>
            </div>

            <form id="add-task-form">
                <div id="add-task-input-div">
                    <input id="add-task-input" placeholder="" autocomplete="off">
                    <label id="add-task-label" for="add-task-input">New Task</label>
                </div>

                <button id="add-task-button">Add</button>
            </form>

            <div>
                <p id="completed-label">
                    Tasks completed: 0
                </p>
            </div>

            <ul id="task-list">
                <li>
                    <!-- Task items go here. -->
                </li>
            </ul>
        </main>

        <script src="script.js">
            // This is a functionality processing script. (see /script.js)
        </script>
    </body>
</html>
