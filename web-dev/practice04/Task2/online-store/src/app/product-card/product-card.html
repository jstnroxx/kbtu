<div class="flexbox" (mouseleave)="hideControls()">
    <div>
        <button class="product-thumbnail-arrow product-thumbnail-arrow-left" [style.visibility]="isThumbnailControl ? 'visible' : 'hidden'" (click)="previousThumbnail()">
            <
        </button>
    </div>

    <div class="product-card">
        <div class="product-image-container" (mouseenter)="showControls()">
            <img class="product-image" [src]="currentImagePath()" [alt]="productObject()?.name"/>
        </div>
        
        <p class="product-title">
            {{ productObject()?.name }}
        </p>

        <p class="product-description">
            {{ productObject()?.description }}
        </p>

        <p class="product-price">
            <sup>&#8376;&nbsp;</sup><span class="price-tag">{{ productObject()?.price | number: '3.2-2'}}</span>&nbsp;<span class="price-currency">KZT</span>
        </p>

            <button class="product-view-button" (click)="redirectTo(productObject()?.link ?? '/')">View</button>

        </div>

    <div>
        <button class="product-thumbnail-arrow product-thumbnail-arrow-right" [style.visibility]="isThumbnailControl ? 'visible' : 'hidden'" (click)="nextThumbnail()">
